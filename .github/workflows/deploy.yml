name: Build -> Docker -> Push -> Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  IMAGE_BASE: ghcr.io/${{ secrets.GHCR_USERNAME }}/wordify-fe

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build Frontend and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          docker build \
            --build-arg VITE_API_BASE_URL="${{ vars.WORDIFY_FE_API_BASE_URL }}" \
            -t ${IMAGE_BASE}:${SHORT_SHA} .
          docker tag ${IMAGE_BASE}:${SHORT_SHA} ${IMAGE_BASE}:latest

      - name: Push image (sha)
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          docker push ${IMAGE_BASE}:${SHORT_SHA}

      - name: Push image (latest)
        run: docker push ${IMAGE_BASE}:latest

  deploy:
    name: Deploy to Production Server
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          script: |
            set -e
            DEPLOY_DIR="${{ vars.WORDIFY_FE_DEPLOY_DIR }}"
            if [ -z "$DEPLOY_DIR" ]; then
              DEPLOY_DIR="/opt/wordify-fe"
            fi
            cd "$DEPLOY_DIR"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose pull
              docker-compose up -d --remove-orphans
            else
              docker compose pull
              docker compose up -d --remove-orphans
            fi
